<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{width: 100vw;height: 100vh;margin: 0;}
        table{height: 100%;width: 100%;border-collapse: collapse;border: none;}
        td{border-bottom: 1px solid #000;border-right: 1px solid #000;}
        tr:last-child td{border-bottom: none;}
        tr td:last-child{border-right: none;}
    </style>
</head>
<body>
    <table>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </table>
    <script type="module">
        import { LocalNotifications } from '@capacitor/local-notifications';
        // 스크립트 상단에 추가
        const requestPermission = async () => {
            let status = await LocalNotifications.checkPermissions();
            if (status.display !== 'granted') {
                await LocalNotifications.requestPermissions();
            }
        };
        requestPermission();
        // 코드 상단 혹은 스크립트 맨 처음에 추가
        (async () => {
            await LocalNotifications.createChannel({
                id: 'bomb-channel',
                name: '걸렸구나',
                importance: 5, // 여기가 핵심! 5여야 플로트(헤드업) 알림이 뜹니다.
            });
        })();
        let rdnb=Math.floor(Math.random()*16)
        document.querySelectorAll('td').forEach((a,i)=>{
            a.addEventListener('click',async ()=>{
                if (i==rdnb) {
                    a.style.backgroundColor='red'
                    navigator.vibrate([500,100,500])
                    await LocalNotifications.schedule({
                        notifications:[{
                            title: "걸렸구나!!!!!!!!",
                            body: "☠☠☠☠☠☠☠☠",
                            id: 1,
                            channelId: 'bomb-channel',
                            sound: 'zombie.wav'
                    }]
                    })
                    setTimeout(() => {
                        location.reload()
                    }, 4000);
                }
                else a.style.backgroundColor='green'
            })
        })
    </script>
</body>
</html>
